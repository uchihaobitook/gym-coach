name: gym_coach
description: Gym Coach — offline workout tracker for your personal coach program.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.2
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  path_provider: ^2.1.6
  uuid: ^4.5.3
  audioplayers: ^6.8.1
  vibration: ^3.2.0
  share_plus: ^12.0.2
  file_picker: ^8.1.7
  collection: any
  equatable: ^2.0.7
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  http: ^1.6.0
  ota_update: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/
    - assets/sounds/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
